name: release-drafter

on:
  push:
    branches:
      - main

permissions: {}

jobs:
  update_release_draft:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: read

    steps:
      - uses: release-drafter/release-drafter@c2e2804cc59f45f57076a99af580d0fedb697927 # v7.3.0
