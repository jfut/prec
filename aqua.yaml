    - linux
# aqua update-checksum --deep --prune
packages:
- name: casey/just@1.51.0
# go
- name: golang/go@1.26.3
- name: golangci/golangci-lint@v2.12.2
- name: goreleaser/goreleaser@v2.15.4
- name: upx/upx@v5.1.1
